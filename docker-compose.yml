services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend
      - ./storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1
      - API_TOKEN=${API_TOKEN:-videoclipper-local-token}
    restart: unless-stopped
